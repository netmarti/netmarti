name: Audit Top Repositories Weekly

on:
  schedule:
    # Runs every Wednesday at 5:00 PM UTC (9PM Barcelona time)
    - cron: '0 17 * * 3'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  audit-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Find or Create Audit Issue
        id: find-issue
        uses: peter-evans/find-issue@v2
        with:
          title-pattern: 'Auditoría Semanal de Repositorios Destacados'

      - name: Create Issue if Not Exists
        if: steps.find-issue.outputs.issue == ''
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: Auditoría Semanal de Repositorios Destacados
          content-filepath: ./audits/template-audit.md
          labels: audit, weekly-check

      - name: Generate Audit Report
        id: generate-report
        run: |
          cat <<EOF > audit-report.md
          # 🔍 Auditoría de Top 6 Repositorios

          **Fecha de Ejecución:** $(date +'%Y-%m-%d %H:%M')
          **Usuario:** @netmarti

          ## Repositorios Actuales Destacados
          | # | Repositorio | Estado | Último Commit |
          |---|-------------|--------|---------------|
          | 1 | browser-agent-kit | Estable | Verificar |
          | 2 | codebase-memory-mcp | Estable | Verificar |
          | 3 | openwiki | Estable | Verificar |
          | 4 | palmier-pro | Estable | Verificar |
          | 5 | vllm | Fork (mantenido) | Verificar |
          | 6 | video-forge | Estable | Verificar |

          ---

          # Repositorios Candidatos para Considerar

          *Repositorios nuevos o forks añadidos en los últimos 30 días*

          ```bash
          gh api /users/netmarti/repos \
            --jq '.[] | select(.pushed_at > "'$(date -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)'") | {name, pushed_at, stargazers_count}'
          ```

          # Tabla de Recomendaciones Accionables

          | Acción | Repositorio | Tiempo Estimado | Impacto |
          |--------|-------------|-----------------|---------|
          | Revisar README | [NUEVO_REPO] | 5 min | ★★★★☆ |
          | Añadir tests | [NUEVO_REPO] | 15 min | ★★★★★ |
          | Crear CONTRIBUTING.md | [NUEVO_REPO] | 5 min | ★★★★☆ |
          | Eliminar del Top 6 | [ANTIGUO_REDUCE-ACTIVITY] | 2 min | ★★★☆☆ |

          ---

          # Criterios de Evaluación

          | Factor | Peso | Umbral Mínimo |
          |--------|------|---------------|
          | Actividad reciente (30d) | 40% | ≥1 commit |
          | Documentación completa | 30% | README + CONTRIBUTING |
          | Validez temática (IA/Agents) | 20% | Related topic match |
          | Estrellas orgánicas | 10% | ≥3 stars |

          ---

          # Checklist para Decidir Reemplazo

          - [ ] El nuevo repositorio tiene código activo (commits últimos 30 días)
          - [ ] Tiene documentación básica (README completo)
          - [ ] Aporta valor temático relacionado con Agentes IA
          - [ ] Reemplaza repositorio inactivo (commits > 90 días)

          # Siguientes Pasos

          1. Revisa los repositorios marcados como **HIGH priority**
          2. Si seleccionas reemplazar alguno: Ve a Settings → Featured Repositories
          3. Actualiza manualmente tu selección (requiere acción humana para aprobación final)

          ---

          _Automatically generated by GitHub Growth System_
          _Manual review required before updating Featured Repositories_
          EOF

      - name: Post Report to Issue
        uses: peter-evans/create-or-update-comment@v3
        with:
          issue-number: 1
          body-path: audit-report.md

      - name: Log Completion
        run: |
          echo "Audit completed successfully $(date)" >> audit-log.txt

      - name: Upload Audit Artifact
        uses: actions/upload-artifact@v3
        with:
          name: audit-report-${{ github.run_id }}
          path: audit-report.md

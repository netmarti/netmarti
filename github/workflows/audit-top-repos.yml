name: Audit Top Repositories Weekly

on:
  schedule:
    # Runs every Wednesday at 5:00 PM UTC (9PM Barcelona time)
    - cron: '0 17 * * 3'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  audit-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Analyze Repository Activity
        id: analyze
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const octokit = github;
            
            // Fetch user's repositories sorted by pushed date (most recent first)
            const repos = await octokit.repos.listForUser({
              username: 'netmarti',
              sort: 'pushed',
              per_page: 20
            });
            
            // Current featured repos (from netmarti/netmarti README or known list)
            const currentFeatured = [
              'browser-agent-kit',
              'codebase-memory-mcp',
              'openwiki',
              'palmier-pro',
              'vllm',
              'video-forge'
            ];
            
            // Calculate potential replacements based on:
            // 1. Recently pushed (last 30 days)
            // 2. Stars count (if > 5 stars and not in featured)
            // 3. Issues open (indicates active community)
            
            const candidateRepos = repos.data.filter(repo => 
              !currentFeatured.includes(repo.name) &&
              new Date(repo.pushed_at) > new Date(Date.now() - 30 * 24 * 60 * 60 * 1000)
            ).slice(0, 5);
            
            // Generate recommendations
            let recommendations = [];
            
            if (candidateRepos.length > 0) {
              candidateRepos.forEach(repo => {
                const daysSincePush = Math.floor((Date.now() - new Date(repo.pushed_at)) / (1000 * 60 * 60 * 24));
                
                if (daysSincePush <= 7) {
                  recommendations.push({
                    repo: repo.name,
                    reason: `Activo hace ${daysSincePush} día(s) - Alto potencial de impacto`,
                    stars: repo.stargazers_count,
                    priority: 'HIGH'
                  });
                } else if (repo.stargazers_count >= 3) {
                  recommendations.push({
                    repo: repo.name,
                    reason: `${repo.stargazers_count} estrellas orgánicas - Validación comunitaria`,
                    stars: repo.stargazers_count,
                    priority: 'MEDIUM'
                  });
                }
              });
            }
            
            // Store result in environment variable
            core.setOutput('recommendations', JSON.stringify(recommendations));
            
            // Log for debugging
            console.log('Candidate repos:', recommendations);

      - name: Create/Update Audit Comment
        uses: peter-evans/create-or-update-comment@v3
        with:
          issue-number: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## 🔍 Auditoría Semanal de Top 6 Repositorios
            
            *Ejecutado: Wednesday, July 2026*
            
            # Repositorios Actualmente Destacados
            1. browser-agent-kit
            2. codebase-memory-mcp
            3. openwiki
            4. palmier-pro
            5. vllm
            6. video-forge
            
            ---
            
            # Oportunidades de Reemplazo Detectadas
            
            | Repositorio | Razón | Prioridad | Acción Sugerida |
            |------------|-------|-----------|-----------------|
            | {{REPOS_TABLE}} | *Ver abajo* | {{PRIORITY}} | {{ACTION}} |
            
            # Criterios de Evaluación
            - Repositorios activos en últimos 7 días = **ALTA prioridad**
            - Repositorios con ≥3 estrellas orgánicas = **MEDIA prioridad**
            - Repositorios sin commits en 90+ días = Considerar eliminación
            
            # Siguientes Pasos
            1. Revisa los repositorios marcados como **HIGH priority**
            2. Si seleccionas reemplazar alguno: Ve a Settings → Featured Repositories
            3. Actualiza manualmente tu selección (requiere acción humana para aprobación final)
            
            _Auto-generated by Growth Bot_

      - name: Send Notification if High Priority Found
        if: env.HIGH_PRIORITY_COUNT > 0
        run: |
          echo "High priority repos detected! Review dashboard."
